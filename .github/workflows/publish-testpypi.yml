name: Publish to TestPyPI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          namespace = {}
          exec(Path("medpc2excel/__init__.py").read_text(encoding="utf-8"), namespace)
          print(f"version={namespace['__version__']}")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel install in a clean virtual environment
        run: |
          python -m venv .pkg-venv
          . .pkg-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import medpc2excel
          from medpc2excel.medpc_read import medpc_read

          assert medpc2excel.__version__
          assert callable(medpc_read)
          PY
          command -v medpc2excel

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/medpc2excel/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  install-check:
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install published package from TestPyPI
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "medpc2excel==${PACKAGE_VERSION}"

      - name: Verify installed package interfaces
        run: |
          python - <<'PY'
          import medpc2excel
          from medpc2excel.medpc_read import medpc_read

          assert medpc2excel.__version__
          assert callable(medpc_read)
          PY
          command -v medpc2excel
